<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: dynamic(~{::main})}">
<main>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded-3 shadow-sm border-start border-4 border-primary">
            <h4 class="fw-bold text-primary m-0 text-uppercase"><i class="bi bi-cpu-fill me-2"></i>Linh kiện mới nhất</h4>
            <div class="text-muted small text-uppercase fw-bold">Hiển thị [[${items.size()}]] sản phẩm</div>
        </div>

        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3 mb-5" v-pre>
            <div th:each="p : ${items}" class="col">
                <div class="product-card">
                    <a th:href="@{|/product/detail/${p.id}|}" class="text-decoration-none">
                        <div class="text-center bg-light rounded p-2 d-flex align-items-center justify-content-center" style="height: 180px;">
                            <img th:src="@{|/images/${p.image}|}" class="img-fluid" style="max-height: 100%; object-fit: contain;">
                        </div>
                        <div class="product-name mt-2">[[${p.name}]]</div>
                    </a>

                    <div class="mt-auto">
                        <div class="price-now mb-2">[[${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}]]đ</div>
                        <button th:attr="onclick=|cart.add(${p.id}, '${p.name}', ${p.price}, '${p.image}')|"
                                class="btn btn-buy w-100">
                            <i class="bi bi-cart-plus-fill me-1"></i> THÊM GIỎ HÀNG
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</html>
