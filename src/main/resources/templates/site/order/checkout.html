<main th:replace="~{fragments/layout :: dynamic(~{::section})}">
    <section class="container mt-5">
        <div class="row g-5">
            <div class="col-md-7">
                <h4 class="fw-bold text-primary mb-4 border-bottom pb-2">THÔNG TIN GIAO HÀNG</h4>
                <form class="row g-3 bg-white p-4 rounded-4 shadow-sm">
                    <div class="col-md-12">
                        <label class="form-label small fw-bold text-muted">Họ và tên người nhận</label>
                        <input type="text" class="form-control" placeholder="Ví dụ: Võ Xuân Phú" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Số điện thoại</label>
                        <input type="tel" class="form-control" placeholder="09xx xxx xxx" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Email</label>
                        <input type="email" class="form-control" placeholder="phuvx@fpt.edu.vn">
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-bold text-muted">Địa chỉ nhận hàng</label>
                        <textarea class="form-control" rows="3" placeholder="Số nhà, tên đường, phường/xã..."></textarea>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="button" class="btn btn-primary btn-lg w-100 fw-bold py-3 shadow">
                            XÁC NHẬN ĐẶT HÀNG
                        </button>
                    </div>
                </form>
            </div>

            <div class="col-md-5">
                <div class="card border-0 shadow-sm rounded-4 p-4 bg-light">
                    <h5 class="fw-bold mb-4">ĐƠN HÀNG CỦA BẠN</h5>
                    <div v-for="item in cart.items" class="d-flex justify-content-between align-items-center mb-3">
                        <span class="small text-truncate me-3" style="max-width: 200px;">{{item.name}} (x{{item.qty}})</span>
                        <span class="small fw-bold">{{(item.price * item.qty).toLocaleString()}}đ</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between h5 fw-bold text-danger">
                        <span>THÀNH TIỀN:</span>
                        <span>{{cart.amount.toLocaleString()}}đ</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
